# Per Master Spec §20.2 — universe builder defaults.
# Phase 2 (Claude_Cowork_PHASE2_MARKET_UNIVERSE.md §6.5/6.6): market-specific
# liquidity thresholds and per-market candidate caps. A/H/US are treated
# differently on purpose — do not collapse this back into one universal rule.

default:
  lookback_days: 120
  max_candidates_per_market: 30

holdings:
  always_include: true

markets:
  A:
    max_candidates: 50
    # average daily turnover amount in CNY over the lookback window
    min_liquidity_amount: 50000000
    exclude_suspended: true
    exclude_st: true
  H:
    max_candidates: 30
    # lower threshold than A, per spec §6.5 ("allow lower liquidity
    # threshold than A when configured")
    min_liquidity_amount: 20000000
    exclude_suspended: true
    exclude_st: false
  US:
    max_candidates: 30
    # dollar volume preferred; builder falls back to plain volume with a
    # warning if avg_dollar_volume is not present in the provider data.
    min_dollar_volume: 5000000
    exclude_suspended: true
    exclude_st: false
