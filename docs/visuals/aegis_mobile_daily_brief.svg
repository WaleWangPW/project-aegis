<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400">
  <defs>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09100f"/>
      <stop offset="100%" stop-color="#020303"/>
    </linearGradient>
    <filter id="phoneShadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="36" stdDeviation="42" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      .h1 { font-family: "Avenir Next", "SF Pro Display", sans-serif; font-size: 58px; font-weight: 800; fill: #f6edd8; letter-spacing: -1px; }
      .h2 { font-family: "Avenir Next", "SF Pro Display", sans-serif; font-size: 34px; font-weight: 760; fill: #f6edd8; }
      .text { font-family: "Avenir Next", "SF Pro Text", sans-serif; font-size: 24px; fill: #c4ccc6; }
      .muted { font-family: "Avenir Next", "SF Pro Text", sans-serif; font-size: 20px; fill: #7f8a84; }
      .tiny { font-family: "Avenir Next", "SF Pro Text", sans-serif; font-size: 16px; letter-spacing: 2px; fill: #cfbd7d; }
      .card { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.12); stroke-width: 1.2; }
      .inner { fill: rgba(255,255,255,0.035); stroke: rgba(255,255,255,0.08); }
    </style>
  </defs>

  <rect width="1000" height="1400" fill="#d9d0c0"/>
  <g filter="url(#phoneShadow)">
    <rect x="230" y="70" width="540" height="1260" rx="86" fill="#050607"/>
    <rect x="252" y="96" width="496" height="1208" rx="68" fill="url(#phoneBg)"/>
    <rect x="414" y="116" width="172" height="24" rx="12" fill="#121817"/>

    <text x="294" y="208" class="tiny">CEO DAILY BRIEF</text>
    <text x="294" y="284" class="h1">Hold</text>
    <text x="294" y="326" class="text">Risk veto remains active.</text>

    <rect x="294" y="384" width="412" height="168" rx="34" class="card"/>
    <text x="326" y="440" class="muted">Today's conclusion</text>
    <text x="326" y="488" class="h2">No new action</text>
    <text x="326" y="526" class="text">Evidence is fresh. Exit code verified.</text>

    <rect x="294" y="586" width="412" height="188" rx="34" class="card"/>
    <text x="326" y="642" class="muted">Risk blockers</text>
    <rect x="326" y="674" width="170" height="54" rx="27" fill="rgba(255,120,120,0.14)" stroke="rgba(255,120,120,0.28)"/>
    <text x="354" y="710" class="text">Regime</text>
    <rect x="512" y="674" width="160" height="54" rx="27" fill="rgba(255,120,120,0.14)" stroke="rgba(255,120,120,0.28)"/>
    <text x="540" y="710" class="text">Volatility</text>

    <rect x="294" y="808" width="412" height="196" rx="34" class="card"/>
    <text x="326" y="864" class="muted">Executable candidates</text>
    <text x="326" y="918" class="h2">2 watch</text>
    <text x="326" y="956" class="text">No candidate passes risk gate today.</text>

    <rect x="294" y="1038" width="412" height="176" rx="34" class="inner"/>
    <text x="326" y="1094" class="muted">Review memory</text>
    <text x="326" y="1146" class="text">Prior failed case: avoid momentum buy when regime conflict persists.</text>

    <rect x="336" y="1242" width="328" height="10" rx="5" fill="#f6edd8" opacity="0.55"/>
  </g>
</svg>
