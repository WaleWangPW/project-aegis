<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f12"/>
      <stop offset="55%" stop-color="#111817"/>
      <stop offset="100%" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1dfaa"/>
      <stop offset="100%" stop-color="#9f8b50"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000" flood-opacity="0.38"/>
    </filter>
    <style>
      .h1 { font-family: "Avenir Next", "SF Pro Display", sans-serif; font-size: 54px; font-weight: 700; fill: #f7efd9; letter-spacing: -1px; }
      .h2 { font-family: "Avenir Next", "SF Pro Display", sans-serif; font-size: 28px; font-weight: 700; fill: #f7efd9; }
      .kpi { font-family: "Avenir Next", "SF Pro Display", sans-serif; font-size: 46px; font-weight: 700; fill: #f7efd9; }
      .text { font-family: "Avenir Next", "SF Pro Text", sans-serif; font-size: 18px; fill: #b9c2bd; }
      .muted { font-family: "Avenir Next", "SF Pro Text", sans-serif; font-size: 15px; fill: #7e8983; }
      .eyebrow { font-family: "Avenir Next", "SF Pro Text", sans-serif; font-size: 13px; letter-spacing: 2px; fill: #cdbd80; }
      .shell { fill: rgba(255,255,255,0.045); stroke: rgba(255,255,255,0.12); stroke-width: 1.2; }
      .core { fill: rgba(8,12,14,0.86); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .good { fill: rgba(110,231,183,0.14); stroke: rgba(110,231,183,0.45); }
      .bad { fill: rgba(255,120,120,0.13); stroke: rgba(255,120,120,0.38); }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1350" cy="140" r="260" fill="#f1dfaa" opacity="0.06"/>
  <circle cx="190" cy="830" r="280" fill="#6ee7b7" opacity="0.06"/>

  <text x="86" y="96" class="eyebrow">V1.5 REVIEW SYSTEM CONCEPT</text>
  <text x="84" y="158" class="h1">Weekly Review Console</text>
  <text x="86" y="198" class="text">Focus: results, errors, lessons, and Investment Memory reuse. No trading controls.</text>

  <g filter="url(#shadow)">
    <rect x="86" y="250" width="330" height="190" rx="36" class="shell"/>
    <rect x="102" y="266" width="298" height="158" rx="28" class="core"/>
    <text x="128" y="306" class="muted">Weekly return</text>
    <text x="128" y="366" class="kpi">+2.4%</text>
    <text x="128" y="398" class="text">2 reviewed recommendations</text>

    <rect x="450" y="250" width="330" height="190" rx="36" class="shell"/>
    <rect x="466" y="266" width="298" height="158" rx="28" class="core"/>
    <text x="492" y="306" class="muted">Error attribution</text>
    <text x="492" y="366" class="kpi">1</text>
    <text x="492" y="398" class="text">risk factor missed</text>

    <rect x="814" y="250" width="330" height="190" rx="36" class="shell"/>
    <rect x="830" y="266" width="298" height="158" rx="28" class="core"/>
    <text x="856" y="306" class="muted">Memory references</text>
    <text x="856" y="366" class="kpi">2</text>
    <text x="856" y="398" class="text">available for future briefs</text>

    <rect x="1178" y="250" width="330" height="190" rx="36" class="shell"/>
    <rect x="1194" y="266" width="298" height="158" rx="28" class="core"/>
    <text x="1220" y="306" class="muted">Safety state</text>
    <text x="1220" y="366" class="kpi">Dry</text>
    <text x="1220" y="398" class="text">no broker, no webhook</text>

    <rect x="86" y="490" width="680" height="360" rx="38" class="shell"/>
    <rect x="104" y="508" width="644" height="324" rx="30" class="core"/>
    <text x="132" y="556" class="h2">Best and Failed Cases</text>
    <rect x="132" y="594" width="278" height="150" rx="26" class="good"/>
    <text x="158" y="632" class="muted">Best case</text>
    <text x="158" y="672" class="h2">US.AAA +5.0%</text>
    <text x="158" y="706" class="text">Good decision, risk controlled.</text>
    <rect x="438" y="594" width="278" height="150" rx="26" class="bad"/>
    <text x="464" y="632" class="muted">Failed case</text>
    <text x="464" y="672" class="h2">US.BBB -3.0%</text>
    <text x="464" y="706" class="text">Momentum failed under regime shift.</text>

    <rect x="814" y="490" width="694" height="360" rx="38" class="shell"/>
    <rect x="832" y="508" width="658" height="324" rx="30" class="core"/>
    <text x="860" y="556" class="h2">Investment Memory</text>
    <line x1="862" y1="598" x2="1458" y2="598" stroke="rgba(255,255,255,0.10)"/>
    <text x="862" y="640" class="text">Lesson 01: strong evidence and risk pass improved follow-through.</text>
    <text x="862" y="686" class="text">Lesson 02: missed market-regime conflict reduced confidence.</text>
    <text x="862" y="748" class="muted">Future daily brief can cite these records, but cannot mutate strategy automatically.</text>
  </g>

  <rect x="86" y="892" width="1422" height="58" rx="29" fill="rgba(241,223,170,0.09)" stroke="rgba(241,223,170,0.23)"/>
  <text x="126" y="928" class="text">Approval focus: Should V1.5 UI be a review console, or should it be merged into the CEO Daily Brief?</text>
</svg>

